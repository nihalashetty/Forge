<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forge — AI Agent Platform</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Hubot+Sans:ital,wght@0,400..800;1,400..700&family=Hanken+Grotesk:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/tokens.css">
<style>
  @keyframes pulse { 0%,100% { transform: scale(1); opacity: 1; } 50% { transform: scale(.6); opacity: .5; } }
  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes blink { 50% { opacity: 0; } }
  @keyframes slide { from { left: 0; } to { left: 100%; } }
  /* Use IBM Plex Mono as Commit Mono fallback, Hanken as Hubot fallback handled in tokens */
  :root { --font-mono: "IBM Plex Mono", ui-monospace, monospace; }
  #boot { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; background: var(--bg-0); z-index: 100; transition: opacity .3s; }
</style>
</head>
<body>
<div id="root"></div>
<div id="boot"><div style="display:flex;align-items:center;gap:12px;color:var(--fg-2);font-family:var(--font-ui)">
  <div style="width:34px;height:34px;border-radius:9px;background:linear-gradient(140deg,#FF6A3D,#B8420F);display:flex;align-items:center;justify-content:center;box-shadow:0 2px 12px rgba(232,84,31,.3)"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3c1 3 4 4 4 8a4 4 0 0 1-8 0c0-1 .5-2 1-2.5C9 11 9.5 13 11 13c-.5-2 .5-3.5 1-4 .3 1 .5 1.5 1.5 2 .2-3-1.5-5-1.5-8z"/></svg></div>
  <span style="font-family:var(--font-display);font-weight:600;font-size:18px;color:var(--fg-0)">Forge</span>
</div></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script src="app/data.js"></script>
<script type="text/babel" src="app/icons.jsx"></script>
<script type="text/babel" src="app/primitives.jsx"></script>
<script type="text/babel" src="app/shell.jsx"></script>
<script type="text/babel" src="app/screens_home.jsx"></script>
<script type="text/babel" src="app/nodes.jsx"></script>
<script type="text/babel" src="app/inspector.jsx"></script>
<script type="text/babel" src="app/canvas.jsx"></script>
<script type="text/babel" src="app/screens_config.jsx"></script>
<script type="text/babel" src="app/screens_config2.jsx"></script>
<script type="text/babel" src="app/screens_knowledge.jsx"></script>
<script type="text/babel" src="app/screens_run.jsx"></script>
<script type="text/babel" src="app/screens_traces.jsx"></script>
<script type="text/babel" src="app/screens_deploy.jsx"></script>
<script type="text/babel" src="app/app.jsx" data-presets="react"></script>
<script type="text/babel" data-presets="react">
  // hide boot splash once React mounts
  const obs = new MutationObserver(() => { const r = document.getElementById('root'); if (r && r.children.length) { const b = document.getElementById('boot'); if (b) { b.style.opacity = 0; setTimeout(() => b.remove(), 320); } obs.disconnect(); } });
  obs.observe(document.getElementById('root'), { childList: true });
</script>
</body>
</html>
